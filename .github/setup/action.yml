name: Setup Tools
description: Action that sets up Node and pnpm
runs:
  using: composite
  steps:
    - name: Setup Vite+
      uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
      with:
        node-version-file: .nvmrc
        run-install: true
        cache: false
    - name: Setup pnpm
      shell: bash
      run: vp install -g pnpm

name: Setup Tools
description: Action that sets up Node and pnpm
runs:
  using: composite
  steps:
    - name: Setup Vite+
      uses: voidzero-dev/setup-vp@13e7afb99c66525824db54e107d667216e795d37 # v1.14.0
      with:
        node-version-file: .nvmrc
        run-install: true
        cache: false
    - name: Setup pnpm
      shell: bash
      run: vp install -g pnpm
